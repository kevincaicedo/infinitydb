# InfinityDB CI — M0-S02 verification-ladder scaffolding.
#
# Layout: this repository's root IS the Cargo workspace (crates/, bins/,
# tests/ at the top level). Jobs run from the repo root; there is no nested
# `infinitydb/` directory on the runner.
#
# NOTE (Linux validation pending): the Linux jobs (io_uring suite, kernel
# matrix, Miri) and the fuzz smoke have not been exercised against a live
# runner yet. First Linux run must verify: io_uring feature probes on 5.15 vs
# 6.1, Miri canary (M0-S02 AC), and the fuzz smoke job.
name: infinity-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: clippy, rustfmt
      - name: fmt
        run: cargo fmt --all --check
      - name: dep-DAG law
        run: ./scripts/check-dep-dag.sh
      - name: cell deny-list
        run: ./scripts/check-cell-denylist.sh
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: build
        run: cargo build --workspace
      - name: test
        run: cargo test --workspace

  cargo-deny:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: Cargo.toml

  miri:
    # Scoped to the unsafe leaf crates (verification ladder §17.2).
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: miri (inf-alloc, inf-fabric)
        run: cargo +nightly miri test -p inf-alloc -p inf-fabric
        env:
          MIRIFLAGS: -Zmiri-strict-provenance

  loom:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - name: loom model (SPSC ring)
        run: cargo test -p inf-fabric --release loom_ -- --nocapture
        env:
          RUSTFLAGS: --cfg loom
          LOOM_MAX_PREEMPTIONS: "3"

  fuzz-smoke:
    # 10-minute smoke per PR (M0-S02); 1 h corpus run is the nightly job.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: fuzz RESP parser (smoke)
        run: cargo +nightly fuzz run resp_parse -- -max_total_time=300
        working-directory: crates/inf-wire
      - name: fuzz fabric codec (smoke)
        run: cargo +nightly fuzz run fabric_codec -- -max_total_time=300
        working-directory: crates/inf-fabric
      - name: fuzz glob matcher (smoke, M1 §5)
        run: cargo +nightly fuzz run glob_match -- -max_total_time=300
        working-directory: crates/inf-server
      - name: fuzz SCAN cursor (smoke, M1 §5)
        run: cargo +nightly fuzz run scan_cursor -- -max_total_time=300
        working-directory: crates/inf-server

  compat-diff:
    # M0-S15 AC: command x edge-case matrix byte-identical to real Redis.
    # M1-S14: the oracle is the PINNED redis:8.0.5 container (the version
    # E1-E6 byte-diffed against), not whatever apt ships — version drift in
    # the oracle would silently move the compat claim. The harness connects
    # via INF_COMPAT_ORACLE_ADDR instead of spawning from PATH.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - name: start pinned oracle (redis 8.0.5, debug commands on, no persistence)
        run: |
          docker run -d --name oracle -p 6390:6379 redis:8.0.5 \
            redis-server --save '' --appendonly no --enable-debug-command yes
          for i in $(seq 1 100); do
            (echo PING | timeout 1 nc 127.0.0.1 6390 | grep -q PONG) && break || sleep 0.2
          done
      - name: compat-diff matrix + generated-matrix staleness gate
        run: cargo test -p compat -- --nocapture
        env:
          INF_COMPAT_ORACLE_ADDR: 127.0.0.1:6390

  client-smoke:
    # M1-S03/S14 AC: major Redis client libraries work against infinityd out
    # of the box (INFO fields, CLIENT surface, pub/sub, SCAN). One job per
    # library would waste runners; one server serves all four sequentially.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - name: build infinityd (release)
        run: cargo build --release -p infinityd
      - name: start infinityd
        run: |
          ./target/release/infinityd --port 6379 &
          for i in $(seq 1 100); do
            (echo PING | timeout 1 nc 127.0.0.1 6379 | grep -q PONG) && break || sleep 0.2
          done
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: redis-py smoke
        run: |
          pip install 'redis>=5,<7'
          python tests/client-smoke/smoke.py
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: node-redis smoke
        run: |
          npm install --no-save redis@^4
          node tests/client-smoke/smoke.mjs
        working-directory: tests/client-smoke
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: go-redis smoke
        run: go mod tidy && go run .
        working-directory: tests/client-smoke/go
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: lettuce smoke
        run: mvn -q -B compile exec:java -Dexec.mainClass=Smoke
        working-directory: tests/client-smoke/java

  sim-smoke:
    # M0-S20: deterministic simulator — smoke scenario twice with trace
    # comparison, plus the in-process determinism/oracle/planted-bug tests.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - name: sim tests (determinism, oracle, planted lost-wakeup)
        run: cargo test -p inf-sim
      - name: m0-smoke determinism (CLI)
        run: cargo run --release --bin inf-sim -- --scenario m0-smoke --seed 0xC0FFEE --verify-determinism

  kernel-matrix:
    # Asserts io_uring feature-probe fallback across kernels (M0-S02).
    # 5.15 (no multishot recv) / 6.1 / latest. Runners only provide their own
    # kernel; older-kernel behavior is exercised via probe-forcing env vars
    # until a self-hosted matrix box exists. PENDING LINUX VALIDATION.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - name: uring suite, probed features
        run: cargo test -p inf-runtime --features uring
      - name: uring suite, forced-degraded (oneshot recv, no provided buffers)
        run: cargo test -p inf-runtime --features uring
        env:
          INF_URING_FORCE_DEGRADED: "1"

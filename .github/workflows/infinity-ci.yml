# InfinityDB CI — M0-S02 verification-ladder scaffolding.
#
# NOTE (Linux validation pending): authored on the macOS dev tier; the Linux
# jobs (io_uring suite, kernel matrix, Miri) have not been exercised against a
# live runner yet. First Linux run must verify: io_uring feature probes on
# 5.15 vs 6.1, Miri canary (M0-S02 AC), and the fuzz smoke job.
name: infinity-ci

on:
  push:
    branches: [main]
    paths: ["infinitydb/**", ".github/workflows/infinity-ci.yml"]
  pull_request:
    paths: ["infinitydb/**", ".github/workflows/infinity-ci.yml"]

defaults:
  run:
    working-directory: infinitydb

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: clippy, rustfmt
      - name: fmt
        run: cargo fmt --all --check
      - name: dep-DAG law
        run: ./scripts/check-dep-dag.sh
      - name: cell deny-list
        run: ./scripts/check-cell-denylist.sh
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: build
        run: cargo build --workspace
      - name: test
        run: cargo test --workspace

  cargo-deny:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: infinitydb/Cargo.toml

  miri:
    # Scoped to the unsafe leaf crates (verification ladder §17.2).
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: miri (inf-alloc, inf-fabric)
        run: cargo +nightly miri test -p inf-alloc -p inf-fabric
        env:
          MIRIFLAGS: -Zmiri-strict-provenance

  loom:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - name: loom model (SPSC ring)
        run: cargo test -p inf-fabric --release loom_ -- --nocapture
        env:
          RUSTFLAGS: --cfg loom
          LOOM_MAX_PREEMPTIONS: "3"

  fuzz-smoke:
    # 10-minute smoke per PR (M0-S02); 1 h corpus run is the nightly job.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: fuzz RESP parser (smoke)
        run: cargo +nightly fuzz run resp_parse -- -max_total_time=300
        working-directory: infinitydb/crates/inf-wire
      - name: fuzz fabric codec (smoke)
        run: cargo +nightly fuzz run fabric_codec -- -max_total_time=300
        working-directory: infinitydb/crates/inf-fabric

  compat-diff:
    # M0-S15 AC: command x edge-case matrix byte-identical to real Redis.
    # The diff test skips loudly when redis-server is absent, so this job
    # exists to make sure it actually runs.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - name: install redis oracle
        run: sudo apt-get update && sudo apt-get install -y redis-server
      - name: compat-diff matrix
        run: cargo test -p compat -- --nocapture

  sim-smoke:
    # M0-S20: deterministic simulator — smoke scenario twice with trace
    # comparison, plus the in-process determinism/oracle/planted-bug tests.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - name: sim tests (determinism, oracle, planted lost-wakeup)
        run: cargo test -p inf-sim
      - name: m0-smoke determinism (CLI)
        run: cargo run --release --bin inf-sim -- --scenario m0-smoke --seed 0xC0FFEE --verify-determinism

  kernel-matrix:
    # Asserts io_uring feature-probe fallback across kernels (M0-S02).
    # 5.15 (no multishot recv) / 6.1 / latest. Runners only provide their own
    # kernel; older-kernel behavior is exercised via probe-forcing env vars
    # until a self-hosted matrix box exists. PENDING LINUX VALIDATION.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - name: uring suite, probed features
        run: cargo test -p inf-runtime --features uring
      - name: uring suite, forced-degraded (oneshot recv, no provided buffers)
        run: cargo test -p inf-runtime --features uring
        env:
          INF_URING_FORCE_DEGRADED: "1"
